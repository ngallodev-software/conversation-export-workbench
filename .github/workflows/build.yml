name: Build conv-tool binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            extension: ""
          - os: macos-latest
            platform: macos
            extension: ""
          - os: windows-latest
            platform: windows
            extension: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller conv-tool.spec

      - name: Prepare versioned binary
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          cp "dist/conv-tool${{ matrix.extension }}" "dist/conv-tool-${version}-${{ matrix.platform }}${{ matrix.extension }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: conv-tool-${{ github.ref_name || 'dev' }}-${{ matrix.platform }}
          path: dist/conv-tool-${{ github.ref_name || 'dev' }}-${{ matrix.platform }}${{ matrix.extension }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Rename binaries for release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          mv "artifacts/conv-tool-${version}-linux/conv-tool-${version}-linux" "artifacts/conv-tool-${version}-linux"
          mv "artifacts/conv-tool-${version}-macos/conv-tool-${version}-macos" "artifacts/conv-tool-${version}-macos"
          mv "artifacts/conv-tool-${version}-windows/conv-tool-${version}-windows.exe" "artifacts/conv-tool-${version}-windows.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/conv-tool-${{ github.ref_name }}-linux
            artifacts/conv-tool-${{ github.ref_name }}-macos
            artifacts/conv-tool-${{ github.ref_name }}-windows.exe
